<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fuel Log</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>

</head>
<body style="margin:0; padding:24px; background:#0E0F11; display:flex; justify-content:center;">
<div id="fuel-log-root"></div>
<style>
  #fuel-log-root, #fuel-log-root * { box-sizing: border-box; }
  #fuel-log-root {
    --bg: #1C1E22;
    --bg-raised: #23262B;
    --bg-card: #26292F;
    --line: #34373D;
    --text: #F0EDE6;

    background: var(--bg-raised); border: 1px solid var(--line); color: var(--text);

  .fl-activity-detail-unit { font-size: 12px; color: var(--text-faint); }

  .fl-gauge-section {
    padding: 28px 24px 8px;

  .fl-modal-overlay {

  .fl-settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 4px; }
  .fl-settings-field { display: flex; flex-direction: column; gap: 5px; font-size: 12px; color: var(--text-dim); }
  .fl-settings-field input, .fl-settings-field select {

  .fl-modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 18px; }
  .fl-modal-cancel {

  .fl-tabs { display: flex; background: var(--bg-raised); border-radius: 8px; padding: 2px; gap: 2px; }
  .fl-tab {
    background: none; border: none; color: var(--text-faint); font-size: 12px; font-weight: 600;

  .fl-recipes-section { padding: 18px 24px 24px; }
  .fl-recipes-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .fl-recipe-list { display: flex; flex-direction: column; gap: 10px; }
  .fl-recipe-card { background: var(--bg-card); border-radius: 10px; padding: 14px; }
  .fl-recipe-card-top { display: flex; justify-content: space-between; align-items: flex-start; }
  .fl-recipe-name { font-size: 14px; font-weight: 600; margin: 0; }
  .fl-recipe-meta { font-size: 11px; color: var(--text-faint); margin: 2px 0 0; }
  .fl-recipe-card-actions { display: flex; gap: 6px; align-items: center; }
  .fl-recipe-macros { display: flex; gap: 14px; font-size: 12px; color: var(--text-dim); margin-top: 10px; }
  .fl-recipe-macros strong { color: var(--gold); font-size: 13px; }
  .fl-recipe-warning { font-size: 11px; color: var(--signal); margin: 8px 0 0; }
  .fl-recipe-log-row { display: flex; gap: 8px; margin-top: 12px; }
  .fl-recipe-log-row input {
    width: 90px; background: var(--bg-raised); border: 1px solid var(--line); color: var(--text);
    border-radius: 6px; padding: 8px 9px; font-size: 13px; outline: none;

  .fl-ingredient-list { display: flex; flex-direction: column; gap: 8px; margin-top: 8px; }
  .fl-ingredient-row { display: flex; gap: 6px; align-items: center; }
  .fl-ingredient-name { flex: 1; min-width: 0; }
  .fl-ingredient-amount { width: 64px; }
  .fl-ingredient-unit { width: 72px; }
  .fl-ingredient-row input, .fl-ingredient-row select {
    background: var(--bg-raised); border: 1px solid var(--line); color: var(--text);
    border-radius: 6px; padding: 7px 8px; font-size: 13px; outline: none;
  }
  .fl-ingredient-row input:focus, .fl-ingredient-row select:focus { border-color: var(--signal); }

  .fl-food-search-row { display: flex; gap: 8px; margin-top: 4px; }
  .fl-food-search-row input {
    flex: 1; background: var(--bg-raised); border: 1px solid var(--line); color: var(--text);
    border-radius: 8px; padding: 9px 11px; font-size: 13px; outline: none;
  }
  .fl-food-search-row input:focus { border-color: var(--signal); }
  .fl-food-search-results {
    display: flex; flex-direction: column; gap: 4px; margin-top: 10px;
    max-height: 180px; overflow-y: auto;
  }
  .fl-food-search-result {
    display: flex; justify-content: space-between; align-items: center; gap: 10px;
    background: var(--bg-raised); border: 1px solid var(--line); border-radius: 8px;
    padding: 9px 11px; font-size: 12px; color: var(--text); cursor: pointer; text-align: left;
  }
  .fl-food-search-result:hover { border-color: var(--signal); }
  .fl-food-search-result-name { flex: 1; }
  .fl-food-search-result-cal { color: var(--gold); white-space: nowrap; font-weight: 600; }

  .fl-chart-header { display: flex; justify-content: space-between; align-items: center; margin: 18px 0 10px; }
  .fl-weight-chart { display: block; margin-top: 4px; }
  .fl-chart-axis-label { font-size: 10px; fill: var(--text-faint); font-family: inherit; }
  .fl-chart-legend { font-size: 11px; color: var(--text-faint); margin: 8px 0 0; display: flex; align-items: center; }
  .fl-chart-legend-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }

  .fl-summary-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 8px; }
  .fl-summary-stat { background: var(--bg-card); border-radius: 10px; padding: 12px 14px; display: flex; flex-direction: column; gap: 4px; }
  .fl-summary-stat-label { font-size: 11px; color: var(--text-faint); }
  .fl-summary-stat-val { font-size: 18px; font-weight: 700; color: var(--text); }

  .fl-activity-totals { display: flex; flex-direction: column; gap: 10px; margin-top: 6px; }
  .fl-activity-total-row { display: grid; grid-template-columns: 90px 1fr auto; align-items: center; gap: 10px; }
  .fl-activity-total-label { font-size: 12px; color: var(--text-dim); }
  .fl-activity-total-bar-track { height: 8px; background: var(--bg-raised); border-radius: 4px; overflow: hidden; }
  .fl-activity-total-bar { height: 100%; background: var(--signal); border-radius: 4px; }
  .fl-activity-total-val { font-size: 12px; color: var(--text-faint); white-space: nowrap; }

  .fl-summary-table-wrap { overflow-x: auto; margin-top: 6px; }
  .fl-summary-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .fl-summary-table th { text-align: left; color: var(--text-faint); font-weight: 600; padding: 6px 8px; border-bottom: 1px solid var(--line); white-space: nowrap; }
  .fl-summary-table td { padding: 7px 8px; border-bottom: 1px solid var(--line); color: var(--text-dim); white-space: nowrap; }
  .fl-summary-table td.fl-num { color: var(--text); }

  .fl-sync-warning {
    background: var(--signal-dim); color: var(--signal); font-size: 12px;
    padding: 8px 24px; border-bottom: 1px solid var(--line);
  }
  .fl-weight-log-form { display: flex; gap: 8px; flex-wrap: wrap; }
  .fl-weight-input { width: 90px; }
  .fl-weight-note-input { flex: 1; min-width: 160px; }
  .fl-weight-log-form input {
    background: var(--bg-raised); border: 1px solid var(--line); color: var(--text);
    border-radius: 8px; padding: 11px 12px; font-size: 14px; outline: none;
  }
  .fl-weight-log-form input:focus { border-color: var(--signal); }

  .fl-auth-wrap {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: #1C1E22; color: #F0EDE6; border-radius: 16px; border: 1px solid #34373D;
    max-width: 360px; margin: 0 auto; padding: 32px 28px;
  }
  .fl-auth-title { font-size: 13px; text-transform: uppercase; letter-spacing: 0.12em; color: #6B6862; font-weight: 600; margin: 0 0 18px; }
  .fl-auth-field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; font-size: 12px; color: #9A968D; }
  .fl-auth-field input {
    background: #23262B; border: 1px solid #34373D; color: #F0EDE6;
    border-radius: 8px; padding: 11px 12px; font-size: 14px; outline: none;

  .fl-auth-field input:focus { border-color: #FF5A36; }
  .fl-auth-btn {
    background: #FF5A36; color: #1C1E22; border: none; border-radius: 8px;

  .fl-auth-btn:hover { background: #ff6e4d; }

</style>
<script>
const {
  useState,
  useEffect,
  useRef,
  useMemo
} = React;

// ---------- Supabase client ----------
const SUPABASE_URL = "https://yqmnkjypphlwtjeabrqy.supabase.co";
const SUPABASE_KEY = "sb_publishable_nEbxz-QBDS1NJ3g4Dp09ew_wi8t3RQ2";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ---------- Data access layer (maps to the 4 Supabase tables) ----------
const db = {
  async getProfile(userId) {
    const {
      data,
      error
    } = await sb.from("profile").select("*").eq("user_id", userId).maybeSingle();
    if (error) throw error;
    return data;
  },
  async upsertProfile(userId, profile) {
    const {
      error
    } = await sb.from("profile").upsert({
      user_id: userId,
      weight_lbs: profile.weightLbs,
      height_in: profile.heightIn,
      age: profile.age,
      sex: profile.sex,
      updated_at: new Date().toISOString()
    });
    if (error) throw error;
  },
  async getDailyLog(userId, dateKey) {
    const {
      data,
      error
    } = await sb.from("daily_logs").select("*").eq("user_id", userId).eq("log_date", dateKey).maybeSingle();
    if (error) throw error;
    return data;
  },
  async getAllDailyLogs(userId) {
    const {
      data,
      error
    } = await sb.from("daily_logs").select("*").eq("user_id", userId).order("log_date", {
      ascending: true
    });
    if (error) throw error;
    return data || [];
  },
  async upsertDailyLog(userId, dateKey, {
    activities,
    entries,
    override
  }) {
    const {
      error
    } = await sb.from("daily_logs").upsert({
      user_id: userId,
      log_date: dateKey,
      activities: activities || {},
      entries: entries || [],
      override: override || null,
      updated_at: new Date().toISOString()
    });
    if (error) throw error;
  },
  async getRecipes(userId) {
    const {
      data,
      error
    } = await sb.from("recipes").select("*").eq("user_id", userId).order("created_at", {
      ascending: true
    });
    if (error) throw error;
    return data || [];
  },
  async upsertRecipe(userId, recipe) {
    const row = {
      user_id: userId,
      name: recipe.name,
      servings: recipe.servings,
      ingredients: recipe.ingredients,
      updated_at: new Date().toISOString()
    };
    if (recipe.id) {
      const {
        data,
        error
      } = await sb.from("recipes").update(row).eq("id", recipe.id).eq("user_id", userId).select().single();
      if (error) throw error;
      return data;
    } else {
      const {
        data,
        error
      } = await sb.from("recipes").insert(row).select().single();
      if (error) throw error;
      return data;
    }
  },
  async deleteRecipe(userId, id) {
    const {
      error
    } = await sb.from("recipes").delete().eq("id", id).eq("user_id", userId);
    if (error) throw error;
  },
  async getWeightLogs(userId) {
    const {
      data,
      error
    } = await sb.from("weight_logs").select("*").eq("user_id", userId).order("log_date", {
      ascending: true
    });
    if (error) throw error;
    return data || [];
  },
  async upsertWeightLog(userId, dateKey, weightLbs, note) {
    const {
      error
    } = await sb.from("weight_logs").upsert({
      user_id: userId,
      log_date: dateKey,
      weight_lbs: weightLbs,
      note: note || null
    });
    if (error) throw error;
  },
  async deleteWeightLog(userId, dateKey) {
    const {
      error
    } = await sb.from("weight_logs").delete().eq("user_id", userId).eq("log_date", dateKey);
    if (error) throw error;
  },
  async getCustomFoods(userId) {
    const {
      data,
      error
    } = await sb.from("custom_foods").select("*").eq("user_id", userId).order("created_at", {
      ascending: true
    });
    if (error) throw error;
    return data || [];
  },
  async createCustomFood(userId, food) {
    const {
      data,
      error
    } = await sb.from("custom_foods").insert({
      user_id: userId,
      name: food.name,
      cal: food.cal,
      protein: food.protein,
      carbs: food.carbs,
      fat: food.fat,
      base_amount: food.baseAmount,
      base_unit: food.baseUnit,
      serving_label: food.servingLabel || null
    }).select().single();
    if (error) throw error;
    return data;
  },
  async deleteCustomFood(userId, id) {
    const {
      error
    } = await sb.from("custom_foods").delete().eq("id", id).eq("user_id", userId);
    if (error) throw error;
  }
};

// ---------- Default athlete profile ----------
const DEFAULT_PROFILE = {
  weightLbs: 160,
  heightIn: 68,
  // 5'8"
  age: 22,
  sex: "male"

// Unit conversion table -> grams, for converting between weight units and
// the food's baseUnit when they don't match (e.g. recipe says "lb" but the
// food's base is "g"). Volume units (cup/tbsp/tsp) and "each"/"slice"/etc.
// are not weight-convertible, so those require the food's baseUnit to match
// the entered unit directly.
const WEIGHT_TO_GRAMS = {
  g: 1,
  oz: 28.3495,
  lb: 453.592,
  kg: 1000
};
const WEIGHT_UNITS = new Set(Object.keys(WEIGHT_TO_GRAMS));

// Standard US volume conversions, all expressed in teaspoons as the common base.
const VOLUME_TO_TSP = {
  tsp: 1,
  tbsp: 3,
  cup: 48
};
const VOLUME_UNITS = new Set(Object.keys(VOLUME_TO_TSP));
function lookupFood(name, customFoods) {
  const text = name.toLowerCase();
  if (customFoods) {
    for (const food of customFoods) {
      if (food.k.some(kw => text.includes(kw))) return food;
    }
  }
  for (const food of FOOD_DB) {
    if (food.k.some(kw => text.includes(kw))) return food;
  }
  return null;
}

// Computes calories/macros for `amount` of `unit` of a given food name.
// Returns null if the food isn't found or the unit can't be reconciled
// with the food's base unit (so the UI can flag it instead of guessing).
// If the ingredient carries its own embedded nutritionData (saved at the
// time it was picked from an online search), that's used directly so the
// recipe stays accurate even after the in-memory search cache is gone.
// customFoods are checked before the built-in database, so a user-created
// food with the same keyword takes priority over a generic match.
function computeIngredient(name, amount, unit, embeddedFood, customFoods) {
  const food = embeddedFood || lookupFood(name, customFoods);
  if (!food) return null;
  const amt = parseFloat(amount) || 0;
  let factor;
  if (unit === food.baseUnit) {
    factor = amt / food.baseAmount;
  } else if (WEIGHT_UNITS.has(unit) && WEIGHT_UNITS.has(food.baseUnit)) {
    const grams = amt * WEIGHT_TO_GRAMS[unit];
    const baseGrams = food.baseAmount * WEIGHT_TO_GRAMS[food.baseUnit];
    factor = grams / baseGrams;
  } else if (WEIGHT_UNITS.has(unit) && food.baseUnit === "g") {
    factor = amt * WEIGHT_TO_GRAMS[unit] / food.baseAmount;
  } else if (VOLUME_UNITS.has(unit) && VOLUME_UNITS.has(food.baseUnit)) {
    // e.g. chicken base entered in tbsp but its base unit is tsp, or
    // cream entered in cups but its base unit is tbsp.
    const tsp = amt * VOLUME_TO_TSP[unit];
    const baseTsp = food.baseAmount * VOLUME_TO_TSP[food.baseUnit];
    factor = tsp / baseTsp;
  } else if (VOLUME_UNITS.has(unit) && food.baseUnit === "each" && food.cloveEquivTsp) {
    // e.g. garlic stored per clove ("each"), entered in tsp/tbsp/cup —
    // bridge via the standard ~1 tsp minced per clove equivalence.
    const tsp = amt * VOLUME_TO_TSP[unit];
    const equivCloves = tsp / food.cloveEquivTsp;
    factor = equivCloves / food.baseAmount;
  } else {
    return {
      unresolved: true,
      food
    };
  }
  return {
    unresolved: false,
    food,
    cal: food.cal * factor,
    protein: food.p * factor,
    carbs: food.c * factor,
    fat: food.f * factor
  };
}

// Searches the free, no-key Open Food Facts database for branded/packaged
// foods not in the local FOOD_DB. Nutrition is always returned per 100g,
// which maps directly onto the existing gram-based conversion logic above.
async function searchOpenFoodFacts(query) {
  const url = `https://world.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(query)}&search_simple=1&action=process&json=1&page_size=8`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`Open Food Facts request failed (${res.status})`);
  const data = await res.json();

    p: p.nutriments["proteins_100g"] || 0,

    baseAmount: 100,
    baseUnit: "g"

const QTY_WORDS = {
  half: 0.5,
  quarter: 0.25,
  "a ": 1,
  an: 1,
  one: 1,
  two: 2,
  three: 3,
  four: 4,
  five: 5,
  six: 6,
  couple: 2
};
function parsePortionMultiplier(text) {
  // Mixed numbers first, e.g. "1 1/2 cups" — must run before the plain
  // fraction check below, since "1/2" inside "1 1/2" would otherwise match
  // first and silently drop the leading whole number.
  const mixedMatch = text.match(/(\d+)\s+(\d+)\s*\/\s*(\d+)/);
  if (mixedMatch) {
    const whole = parseFloat(mixedMatch[1]);
    const num = parseFloat(mixedMatch[2]);
    const den = parseFloat(mixedMatch[3]);
    if (den > 0) return whole + num / den;
  }
  // Plain fractions, e.g. "1/4 cup", "3/4 cup" — must run before the plain
  // number match below, since "1/4" would otherwise be misread as just "1".
  const fractionMatch = text.match(/(\d+)\s*\/\s*(\d+)/);
  if (fractionMatch) {
    const num = parseFloat(fractionMatch[1]);
    const den = parseFloat(fractionMatch[2]);
    if (den > 0) return num / den;
  }
  const numMatch = text.match(/(\d+(\.\d+)?)\s*(x|cups?|slices?|oz|servings?)?/);
  if (numMatch && numMatch[1]) {
    const n = parseFloat(numMatch[1]);
    if (n > 0 && n < 20) return n;
  }
  for (const [word, val] of Object.entries(QTY_WORDS)) {
    if (text.includes(word)) return val;
  }
  return 1;
}
function estimateFromText(raw, customFoods) {
  const text = raw.toLowerCase();
  const segments = text.split(/,| and |\+|;/).map(s => s.trim()).filter(Boolean);
  let totals = {
    cal: 0,
    p: 0,
    c: 0,
    f: 0
  };
  let matched = [];
  let unmatchedSegments = [];
  segments.forEach(seg => {
    let found = null;
    if (customFoods) {
      for (const food of customFoods) {
        if (food.k.some(kw => seg.includes(kw))) {
          found = food;
          break;
        }
      }
    }
    if (!found) {
      for (const food of FOOD_DB) {
        if (food.k.some(kw => seg.includes(kw))) {
          found = food;
          break;
        }
      }
    }
    if (found) {
      const mult = parsePortionMultiplier(seg);
      totals.cal += found.cal * mult;
      totals.p += found.p * mult;
      totals.c += found.c * mult;
      totals.f += found.f * mult;
      matched.push(seg);
    } else {
      unmatchedSegments.push(seg);
    }
  });
  unmatchedSegments.forEach(seg => {
    if (!seg) return;
    const mult = parsePortionMultiplier(seg);
    totals.cal += 180 * mult;
    totals.p += 8 * mult;
    totals.c += 20 * mult;
    totals.f += 7 * mult;
  });
  return {
    cal: Math.round(totals.cal),
    protein: Math.round(totals.p),
    carbs: Math.round(totals.c),
    fat: Math.round(totals.f),
    confidence: unmatchedSegments.length === 0 ? "matched" : matched.length > 0 ? "partial" : "rough"
  };
}

// Builds everything an SVG line chart needs from a list of {date, weight}
// entries: scaled point coordinates for the raw data and a 7-day moving
// average (daily bodyweight is noisy, so the trend line is what actually
// shows direction), plus axis label values. The y-axis is scaled to the
// data's own min/max rather than starting at 0, since bodyweight changes
// are small relative to absolute weight and a zero-based axis would flatten
// the visual trend into a nearly straight line.
function buildWeightChart(weightLogs, width, height, padding) {
  const sorted = weightLogs.slice().sort((a, b) => a.date.localeCompare(b.date));
  if (sorted.length === 0) return null;
  const weights = sorted.map(w => w.weight);
  const minW = Math.min(...weights);
  const maxW = Math.max(...weights);
  const range = maxW - minW || 1;
  const yPad = range * 0.15; // headroom so points near min/max aren't clipped
  const yMin = minW - yPad;
  const yMax = maxW + yPad;
  const innerW = width - padding.left - padding.right;
  const innerH = height - padding.top - padding.bottom;
  const xForIndex = i => padding.left + (sorted.length === 1 ? innerW / 2 : i / (sorted.length - 1) * innerW);
  const yForWeight = w => padding.top + innerH - (w - yMin) / (yMax - yMin) * innerH;
  const points = sorted.map((w, i) => ({
    x: xForIndex(i),
    y: yForWeight(w.weight),
    date: w.date,
    weight: w.weight,
    note: w.note
  }));

  // 7-entry trailing moving average (by entry count, not calendar days,
  // since weigh-ins may not be perfectly daily).
  const movingAvg = sorted.map((w, i) => {
    const windowStart = Math.max(0, i - 6);
    const windowVals = weights.slice(windowStart, i + 1);
    const avg = windowVals.reduce((a, b) => a + b, 0) / windowVals.length;
    return {
      x: xForIndex(i),
      y: yForWeight(avg)
    };
  });
  return {
    points,
    movingAvg,
    yMin,
    yMax,
    innerW,
    innerH,
    padding
  };
}

// Generic line chart builder for {date, value} series, used for the calorie
// trend. Unlike the weight chart's moving average, this optionally takes a
// fixed target value to draw as a flat reference line, so over/under days
// are visually obvious against a constant rather than a trailing average.
function buildLineChart(series, width, height, padding, targetValue) {
  const sorted = series.slice().sort((a, b) => a.date.localeCompare(b.date));
  if (sorted.length === 0) return null;
  const values = sorted.map(s => s.value);
  const allValues = targetValue != null ? [...values, targetValue] : values;
  const minV = Math.min(...allValues);
  const maxV = Math.max(...allValues);
  const range = maxV - minV || 1;
  const yPad = range * 0.15;
  const yMin = Math.max(0, minV - yPad);
  const yMax = maxV + yPad;
  const innerW = width - padding.left - padding.right;
  const innerH = height - padding.top - padding.bottom;
  const xForIndex = i => padding.left + (sorted.length === 1 ? innerW / 2 : i / (sorted.length - 1) * innerW);
  const yForValue = v => padding.top + innerH - (v - yMin) / (yMax - yMin) * innerH;
  const points = sorted.map((s, i) => ({
    x: xForIndex(i),
    y: yForValue(s.value),
    date: s.date,
    value: s.value
  }));
  const targetY = targetValue != null ? yForValue(targetValue) : null;
  return {
    points,
    targetY,
    yMin,
    yMax,
    innerW,
    innerH,
    padding
  };
}

// Aggregates activity logs across all daily logs into per-activity totals:
// number of sessions, and total distance (for distance-based activities)
// or total minutes (for duration-based activities).
function summarizeActivities(dailyLogRows) {
  const totals = {}; // key -> { sessions, totalAmount }
  dailyLogRows.forEach(row => {
    const activities = row.activities || {};
    Object.entries(activities).forEach(([key, amount]) => {
      const amt = Number(amount) || 0;
      if (amt <= 0) return;
      if (!totals[key]) totals[key] = {
        sessions: 0,
        totalAmount: 0
      };
      totals[key].sessions += 1;
      totals[key].totalAmount += amt;
    });
  });
  return totals;
}

// ---------- Calorie / macro engine ----------
// BMR via Mifflin-St Jeor.
function calcBMR(profile) {
  const kg = profile.weightLbs * 0.453592;
  const cm = profile.heightIn * 2.54;
  const base = 10 * kg + 6.25 * cm - 5 * profile.age;
  return profile.sex === "male" ? base + 5 : base - 161;
}

// Sedentary baseline multiplier for non-exercise daily activity (NEAT),
// then exercise calories are added on top per-activity (research basis:
// TDEE = RMR + NEAT + exercise energy expenditure, summed separately
// rather than folded into one flat multiplier).
const NEAT_MULTIPLIER = 1.15;

// Calories burned for one logged activity instance.
// MET formula for duration-based activities: kcal = METs x weight(kg) x duration(hours).
// For running, distance-based: 100-120 kcal/mile is the well-established range
// (calories per mile stay roughly constant across pace, since a higher MET at
// faster speeds is offset by less time) — confirmed against wearable-measured
// data, which tends to read higher than older formula-only estimates.
function calcActivityBurn(activityKey, value, profile) {
  const act = ACTIVITIES[activityKey];
  const kg = profile.weightLbs * 0.453592;
  if (act.inputType === "distance") {
    const milesVal = value || 0;
    if (activityKey === "bike") {
      // Cycling at moderate effort burns roughly half the per-mile cost of running.
      return Math.round(milesVal * kg * 0.7);
    }
    // Running family: ~1.65 kcal/kg per mile (~110 kcal/mile at 150lb/68kg),
    // scaled slightly by session intensity (tempo/speed runs cost a bit more).
    const intensityFactor = act.met / 9; // normalize around easy-run MET of 9
    return Math.round(milesVal * kg * 1.55 * intensityFactor);
  } else {
    const hours = (value || 0) / 60;
    return Math.round(act.met * kg * hours);
  }
}

// Computes consumed calories and that day's calorie target from a stored
// daily_logs row. If the day had a manual override saved, that's used as
// the target directly; otherwise the target is recomputed from the current
// profile (BMR doesn't change retroactively per day since we don't store a
// historical weight snapshot per entry — this uses today's profile weight
// as the best available approximation for past days).
function summarizeDayRow(row, profile) {
  const entries = row.entries || [];
  const consumed = entries.reduce((sum, e) => sum + (e.cal || 0), 0);
  let target;
  if (row.override && row.override.cals != null) {
    target = row.override.cals;
  } else {
    const bmr = calcBMR(profile);
    const restingPlusNeat = Math.round(bmr * NEAT_MULTIPLIER);
    const activities = row.activities || {};
    const exerciseBurn = Object.entries(activities).reduce((sum, [key, val]) => sum + calcActivityBurn(key, val, profile), 0);
    target = restingPlusNeat + exerciseBurn;
  }
  return {
    date: row.log_date,
    consumed,
    target,
    activities: row.activities || {}
  };
